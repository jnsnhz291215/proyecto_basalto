<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestionar Informes</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/styleg.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="js/navbar_core.js"></script>
  <script src="js/common.js"></script>
  <script src="js/route-guard.js"></script>
  <script src="js/auth_guard.js"></script>
  <script src="js/navbar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #f3f4f6; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: #1f2937; padding: 20px; margin: 0; }
    
    .accordion-button {
      background-color: #f9fafb;
      color: #1f2937;
      font-weight: 600;
      padding: 1.2rem 1.5rem;
    }
    
    .accordion-button:not(.collapsed) {
      background-color: #4f46e5;
      color: white;
      box-shadow: none;
    }
    
    .accordion-button:focus {
      box-shadow: none;
      border-color: #4f46e5;
    }
    
    .accordion-body {
      background-color: #ffffff;
      padding: 1.5rem;
    }
    
    .table-detail {
      font-size: 14px;
      margin-bottom: 0;
    }
    
    .table-detail th {
      background-color: #f3f4f6;
      font-weight: 600;
      color: #374151;
      border-bottom: 2px solid #e5e7eb;
    }
    
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #4f46e5;
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #4f46e5;
    }
    
    .section-title:first-child {
      margin-top: 0;
    }
    
    .badge-activo {
      background-color: #10b981;
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .badge-inactivo {
      background-color: #ef4444;
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .btn-editar {
      background: #e0f2fe;
      color: #0369a1;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    
    .btn-editar:hover {
      background: #bae6fd;
    }
    
    .btn-soft-delete {
      background: #fef3c7;
      color: #d97706;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    
    .btn-soft-delete:hover {
      background: #fde68a;
    }
    
    .btn-hard-delete {
      background: #fee2e2;
      color: #dc2626;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    
    .btn-hard-delete:hover {
      background: #fecaca;
    }
    
    .btn-restaurar {
      background: #d1fae5;
      color: #065f46;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    
    .btn-restaurar:hover {
      background: #a7f3d0;
    }
    
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      padding: 1rem;
      background-color: #f9fafb;
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    
    .info-item {
      font-size: 14px;
    }
    
    .info-item .label {
      font-weight: 600;
      color: #6b7280;
      display: block;
      margin-bottom: 4px;
    }
    
    .info-item .value {
      color: #1f2937;
    }

    /* ── Layout igual a gestionar trabajadores ── */
    .gestionar-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding: 0;
      height: auto;
    }

    .page-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      background: #ffffff;
      padding: 16px 20px;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .page-header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .page-icon {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      color: white;
    }

    .page-title h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }

    .page-title p {
      margin: 4px 0 0 0;
      font-size: 14px;
      color: #6b7280;
    }

    .filters-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px;
      background: #ffffff;
      padding: 14px 16px;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 150px;
    }

    .filter-group label {
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
    }

    .filter-input,
    .filter-select {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      background: #ffffff;
    }

    .filter-input:focus,
    .filter-select:focus {
      outline: none;
      border-color: #4f46e5;
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    .btn-aplicar {
      border: none;
      padding: 9px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #5b52e8;
      color: #ffffff;
      transition: background 0.2s ease;
      margin-top: 18px;
    }

    .btn-aplicar:hover {
      background: #4f46e5;
    }
  </style>
</head>
<body>
  <!-- Shared menu will be injected here -->
  <div id="shared-menu-placeholder"></div>

  <div class="gestionar-container">
    <div class="page-header">
      <div class="page-header-left">
        <div class="page-icon" style="background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);">
          <i class="fa-solid fa-clipboard-list"></i>
        </div>
        <div class="page-title">
          <h1>Gestión de Informes</h1>
          <p>Administrar informes de turno</p>
        </div>
      </div>
    </div>

    <div class="filters-bar">
      <div class="filter-group" style="flex: 1; min-width: 180px;">
        <label for="filtro-operador">Operador</label>
        <input type="text" id="filtro-operador" class="filter-input" placeholder="Buscar...">
      </div>
      <div class="filter-group">
        <label for="filtro-fecha-desde">Desde</label>
        <input type="date" id="filtro-fecha-desde" class="filter-input">
      </div>
      <div class="filter-group">
        <label for="filtro-fecha-hasta">Hasta</label>
        <input type="date" id="filtro-fecha-hasta" class="filter-input">
      </div>
      <div class="filter-group">
        <label for="filtro-estado">Estado</label>
        <select id="filtro-estado" class="filter-select">
          <option value="activos">Activos</option>
          <option value="inactivos">Papelera (Inactivos)</option>
        </select>
      </div>
      <button id="btn-aplicar-filtros" class="btn-aplicar">
        <i class="fa-solid fa-filter"></i> Aplicar Filtros
      </button>
    </div>

    <!-- Vista de Informes (Accordion) -->
    <div id="informes-container">
      <div id="accordion-informes" class="accordion">
        <!-- Los informes se cargarán aquí dinámicamente -->
      </div>
      <div id="sin-informes" style="display:none;text-align:center;padding:60px 20px;color:#9ca3af;">
        <i class="fa-solid fa-clipboard-list" style="font-size:64px;margin-bottom:16px;opacity:0.3;"></i>
        <p style="font-size:18px;font-weight:600;margin-bottom:8px;">No hay informes registrados</p>
        <p style="font-size:14px;">Ajusta los filtros para ver más resultados</p>
      </div>
    </div>
  </div>

  <!-- Modal: Editar Informe -->
  <div class="modal fade" id="modal-editar-informe" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl">
      <div class="modal-content">
        <div class="modal-header" style="background-color: #4f46e5; color: white;">
          <h5 class="modal-title">
            <i class="fa-solid fa-edit"></i> Editar Informe de Turno
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="form-editar-informe">
            <input type="hidden" id="edit-id-informe">
            
            <!-- Información General -->
            <div class="section-title">Información General</div>
            <div class="row g-3 mb-3">
              <div class="col-md-4">
                <label class="form-label">Número de Informe</label>
                <input type="text" id="edit-numero-informe" class="form-control" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Fecha</label>
                <input type="date" id="edit-fecha" class="form-control" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Turno</label>
                <select id="edit-turno" class="form-select" required>
                  <option value="Día">Día</option>
                  <option value="Noche">Noche</option>
                </select>
              </div>
            </div>
            
            <div class="row g-3 mb-3">
              <div class="col-md-4">
                <label class="form-label">Horas Trabajadas</label>
                <input type="number" id="edit-horas-trabajadas" class="form-control" step="0.5">
              </div>
              <div class="col-md-4">
                <label class="form-label">Faena</label>
                <input type="text" id="edit-faena" class="form-control">
              </div>
              <div class="col-md-4">
                <label class="form-label">Lugar</label>
                <input type="text" id="edit-lugar" class="form-control">
              </div>
            </div>
            
            <!-- Información de Personal -->
            <div class="section-title">Personal</div>
            <div class="row g-3 mb-3">
              <div class="col-md-4">
                <label class="form-label">RUT Operador</label>
                <input type="text" id="edit-operador-rut" class="form-control" required>
              </div>
              <div class="col-md-4">
                <label class="form-label">Ayudante 1</label>
                <input type="text" id="edit-ayudante-1" class="form-control">
              </div>
              <div class="col-md-4">
                <label class="form-label">Ayudante 2</label>
                <input type="text" id="edit-ayudante-2" class="form-control">
              </div>
            </div>
            
            <!-- Información de Equipo -->
            <div class="section-title">Equipo y Perforación</div>
            <div class="row g-3 mb-3">
              <div class="col-md-3">
                <label class="form-label">Equipo</label>
                <input type="text" id="edit-equipo" class="form-control">
              </div>
              <div class="col-md-3">
                <label class="form-label">Pozo Número</label>
                <input type="text" id="edit-pozo-numero" class="form-control">
              </div>
              <div class="col-md-3">
                <label class="form-label">Sector</label>
                <input type="text" id="edit-sector" class="form-control">
              </div>
              <div class="col-md-3">
                <label class="form-label">Diámetro</label>
                <input type="text" id="edit-diametro" class="form-control">
              </div>
            </div>
            
            <div class="row g-3 mb-3">
              <div class="col-md-3">
                <label class="form-label">Inclinación</label>
                <input type="text" id="edit-inclinacion" class="form-control">
              </div>
              <div class="col-md-3">
                <label class="form-label">Profundidad Inicial</label>
                <input type="number" id="edit-profundidad-inicial" class="form-control" step="0.01">
              </div>
              <div class="col-md-3">
                <label class="form-label">Profundidad Final</label>
                <input type="number" id="edit-profundidad-final" class="form-control" step="0.01">
              </div>
              <div class="col-md-3">
                <label class="form-label">Metros Perforados</label>
                <input type="number" id="edit-mts-perforados" class="form-control" step="0.01">
              </div>
            </div>
            
            <!-- Parámetros Técnicos -->
            <div class="section-title">Parámetros Técnicos</div>
            <div class="row g-3 mb-3">
              <div class="col-md-3">
                <label class="form-label">Pull Down</label>
                <input type="text" id="edit-pull-down" class="form-control">
              </div>
              <div class="col-md-3">
                <label class="form-label">RPM</label>
                <input type="text" id="edit-rpm" class="form-control">
              </div>
              <div class="col-md-3">
                <label class="form-label">Horómetro Inicial</label>
                <input type="number" id="edit-horometro-inicial" class="form-control" step="0.01">
              </div>
              <div class="col-md-3">
                <label class="form-label">Horómetro Final</label>
                <input type="number" id="edit-horometro-final" class="form-control" step="0.01">
              </div>
            </div>
            
            <div class="row g-3 mb-3">
              <div class="col-md-4">
                <label class="form-label">Horómetro Horas</label>
                <input type="number" id="edit-horometro-hrs" class="form-control" step="0.01">
              </div>
              <div class="col-md-4">
                <label class="form-label">Insumo Petróleo</label>
                <input type="text" id="edit-insumo-petroleo" class="form-control">
              </div>
              <div class="col-md-4">
                <label class="form-label">Insumo Lubricantes</label>
                <input type="text" id="edit-insumo-lubricantes" class="form-control">
              </div>
            </div>
            
            <!-- Observaciones -->
            <div class="section-title">Observaciones</div>
            <div class="mb-3">
              <textarea id="edit-observaciones" class="form-control" rows="4"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="btn-guardar-edicion" class="btn" style="background-color: #4f46e5; color: white;">
            <i class="fa-solid fa-save"></i> Guardar Cambios
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de Confirmación -->
  <div class="modal fade" id="modal-confirmar" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-confirmar-titulo">Confirmar Acción</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p id="modal-confirmar-mensaje"></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="btn-confirmar-accion" class="btn btn-danger">Confirmar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="js/informe_export.js"></script>
  <script src="js/gestioninformes.js"></script>
</body>
</html>
